<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA redirect: encode the current path into a query param
    // then redirect to index.html which picks it up and restores the route.
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 2).join('/') + // keep repo prefix e.g. /frontend-nexcare
      '/?p=' + encodeURIComponent(l.pathname.slice(l.pathname.split('/').slice(0, 2).join('/').length) + (l.search ? '&' + l.search.slice(1) : '') + l.hash)
    );
  </script>
</head>
<body></body>
</html>
